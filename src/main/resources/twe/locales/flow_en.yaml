  h4-f1b89b: Your withholding
  h4-7d0acd: Your spouse’s withholding
  h4-9cfae7: Check your withholding every January
  p-47f861: This will help you decide if you need to make any adjustments for the
    year.
  modal-what-is-form-w-4:
    heading: What’s a Form W-4?
    p-52482e: You need to submit a Form W-4 to each of your employers to help them
      withhold the right amount of taxes from your paychecks throughout the year.
    p-14dbf9: Withholding at the right rate ensures that you don’t withhold too much
      and get smaller paychecks, or withhold too little and end up owing a large amount,
      or even penalties, at the end of the year.
    p-a2bc8b: <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-w-4">Learn
      more about Form W-4.</a>
  modal-what-is-form-w-4p:
    heading: What’s a Form W-4P?
    p-f9b7ba: You need to submit a Form W-4P to your pension or annuity providers
      to help them withhold the right amount of taxes from your payments throughout
      the year.
    p-7ca1e5: Withholding at the right rate ensures that you don’t withhold too much
      and get smaller payments, or withhold too little and end up owing a large amount,
      or even penalties, at the end of the year.
    p-d5bee2: <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-w-4-p">Learn
      more about Form W-4P.</a>
  modal-what-is-form-w-4-and-w-4p:
    heading: What’s a Form W-4 and W-4P?
    p-a06431: You need to submit a Form W-4 to each of your employers or a Form W-4P
      to your pension or annuity providers to help them withhold the right amount
      of taxes from your paycheck or pension payment throughout the year.
    p-790f19: Withholding at the right rate ensures that you don’t withhold too much
      and take home a smaller amount, or withhold too little and end up owing a large
      amount, or even penalties, at the end of the year.
    p-a2bc8b: <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-w-4">Learn
      more about Form W-4.</a>
    p-d5bee2: <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-w-4-p">Learn
      more about Form W-4P.</a>
  modal-why-step-1-c:
    heading: Why is this recommended?
    p-e46111: This is the filing status you selected in Step 1 of the estimator.
    p-205b43: Your filing status affects your standard deduction and which credits
      and deductions you’re eligible for.
  modal-why-w-4p-step-2:
    heading: Why is this recommended?
    p-8310ca: This steps helps you decide which job or pension you should withhold
      from.
    p-1eb372: You’ve already completed this step by using the estimator.
  modal-why-w-4-step-2-c:
    heading: Why is this recommended?
    p-7790ad: This is where you can say if you have more than one job, or if you and
      your spouse (if filing jointly) both work.
    p-6eeb8d: Leave this unchecked because the estimator’s recommendation already
      takes multiple jobs (if present) into account so you don’t have to reveal this
      information to your employer.
  modal-why-step-3:
    heading: Why is this recommended?
    p-ba1822: Step 3 shows the total amount of credits you’re planning to claim in
      <fg-show path="/taxYear"/>.
    p-e659ce: This total amount is based on the information you added to the estimator
      for your income, whether you have dependents, and which credits you think you’ll
      qualify for.
  modal-why-w-4-step-4-a:
    heading: Why is this recommended?
    p-837e9a: Step 4 accounts for any differences between the income you earn from
      this job and your other taxable income. The amounts entered here help to adjust
      your withholding to account for this difference.
    p-0909a7: <strong>Step 4(a)</strong> is used if you entered other sources of taxable
      income into the estimator that’s not from jobs, pensions, or annuities.
  modal-why-w-4p-step-4-a:
    heading: Why is this recommended?
    p-28bdd1: Step 4 accounts for any differences between the income you earn from
      this pension or annuity and your other taxable income. The amounts entered here
      help to adjust your withholding to account for this difference.
    p-0909a7: <strong>Step 4(a)</strong> is used if you entered other sources of taxable
      income into the estimator that’s not from jobs, pensions, or annuities.
  modal-why-w-4-step-4-b:
    heading: Why is this recommended?
    p-837e9a: Step 4 accounts for any differences between the income you earn from
      this job and your other taxable income. The amounts entered here help to adjust
      your withholding to account for this difference.
    p-1bdcd8: <strong>Step 4(b)</strong> includes the deductions and adjustments you
      entered into the estimator. These can help reduce how much of your income is
      taxed and the amount you need to withhold.
  modal-why-w-4p-step-4-b:
    heading: Why is this recommended?
    p-28bdd1: Step 4 accounts for any differences between the income you earn from
      this pension or annuity and your other taxable income. The amounts entered here
      help to adjust your withholding to account for this difference.
    p-1bdcd8: <strong>Step 4(b)</strong> includes the deductions and adjustments you
      entered into the estimator. These can help reduce how much of your income is
      taxed and the amount you need to withhold.
  modal-why-w-4-step-4-c:
    heading: Why is this recommended?
    p-837e9a: Step 4 accounts for any differences between the income you earn from
      this job and your other taxable income. The amounts entered here help to adjust
      your withholding to account for this difference.
    p-fb9379: <strong>Step 4(c)</strong> is used if you need to withhold more from
      your paycheck. Otherwise, this box may be left blank.
  modal-why-w-4p-step-4-c:
    heading: Why is this recommended?
    p-28bdd1: Step 4 accounts for any differences between the income you earn from
      this pension or annuity and your other taxable income. The amounts entered here
      help to adjust your withholding to account for this difference.
    p-dd38c7: <strong>Step 4(c)</strong> is used if you need to withhold more from
      your payment. Otherwise, this box may be left blank.
