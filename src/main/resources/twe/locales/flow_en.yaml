                <span condition="/eligibleRemainingPayPeriodsGreaterThanZero" operator="isFalse">you can make <a class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/estimated-taxes">estimated tax payments</a> to make up for the difference between your withholding adjustment and tax owed.</span>
              </span>
              <span condition="/mayNeedToMakeEstimatedPayments" operator="isTrue">
                <span condition="/eligibleRemainingPayPeriodsGreaterThanZero" operator="isTrue">you can reduce your take-home pay by <a class="usa-link" href="#heading-adjust-withholding-for-lower-tax-balance">adjusting your withholding</a> and making <a class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/estimated-taxes">estimated tax payments</a> to make up for the difference between your withholding adjustment and tax owed.</span>
                <span condition="/eligibleRemainingPayPeriodsGreaterThanZero" operator="isFalse">you can make <a class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/estimated-taxes">estimated tax payments</a> to make up for the difference between your withholding adjustment and tax owed.</span>
              </span>
