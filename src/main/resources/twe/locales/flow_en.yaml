      question: How frequently are <span condition="/pensions/*/notSpouses" operator="isTrue">you</span><span
        condition="/pensions/*/notSpouses" operator="isFalse">they</span> paid?
      options:
        weekly:
          name: Weekly
        biWeekly:
          name: Every two weeks
        semiMonthly:
          name: Twice monthly
        monthly:
          name: Once a month
    h5-631cd8: Pension or annuity details
    p-b5e9f9: Once we know more about your pension or annuity, we’ll ask you additional
      questions.
    h5-bee04a: Dates and income
    p-936eda: Use the most recent pension or annuity statement to enter the following
      information.
    /pensions/*/mostRecentPayDate:
      question: What’s the date of <span condition="/pensions/*/notSpouses" operator="isTrue">your</span><span
        condition="/pensions/*/notSpouses" operator="isFalse">their</span> most recent
        pension or annuity payment?
    /pensions/*/averagePayPerPayPeriodForWithholding:
      question: What’s the gross income for the most recent pension or annuity payment?
      modalLink: <modal-link for="modal-pension-gross-pay-period">How do I find the
        gross income for the most recent payment?</modal-link>
    /pensions/*/yearToDateIncome:
      question: What’s the gross income <span condition="/pensions/*/notSpouses" operator="isTrue">you
        have</span><span condition="/pensions/*/notSpouses" operator="isFalse">your
        spouse has</span> received so far in <fg-show path="/taxYear"/>?
      hint: This might be labeled year-to-date or YTD on your statement.<span condition="/pensions/*/isPastJob"
        operator="isTrue"> If you’re expecting a final payment, include that additional
        amount.</span>
      modalLink: <modal-link for="modal-pension-gross-ytd-end">How do I find the gross
        income so far in <fg-show path="/taxYear"/>?</modal-link>
    h5-9f886e: Federal taxes
    /pensions/*/averageWithholdingPerPayPeriod:
      question: Federal taxes withheld (paid) for the most recent payment
      hint: Don’t include state and local taxes, Medicare, or Social Security.
      modalLink: <modal-link for="modal-fed-tax-pension-pay-period">How do I find
        federal taxes withheld for the most recent payment?</modal-link>
    /pensions/*/yearToDateWithholding:
      question: Federal taxes withheld (paid) so far in <fg-show path="/taxYear"/>
      hint: This might be labeled year-to-date or YTD on your statement. Don't include
        state and local taxes, Medicare, or Social Security.
      modalLink: <modal-link for="modal-fed-pension-tax-ytd">How do I find federal
        taxes withheld so far in <fg-show path="/taxYear"/>?</modal-link>
    h5-4504e1: Contributions
    p-74eba3: Check your <span condition="/pensions/*/notSpouses" operator="isFalse">spouse’s</span>
      pension or annuity statement for pre-tax contributions to help pay for benefits.
    fg-detail-c4e577:
      summary: Health insurance
      p-06e7e2: Enter the total contributions made to pay for health coverage.
      p-af178f: Health coverage contributions can usually be found under a <strong>Deductions</strong>
        or <strong>Pre-Tax</strong> section on a statement.
      p-21161b: '<strong>Include contributions for: </strong>'
      ul-0:
        li-7b0c41: Health insurance plans
        li-07aff3: Dental or vision insurance plans
      p-5a0ed2: <strong>Don’t include:</strong>
      ul-1:
        li-a867f4: Long-term care contributions
        li-a981e6: Employer contributions
      /pensions/*/healthInsuranceContributionsPerPayPeriod:
        question: Amount per pay period
      /pensions/*/healthInsuranceContributionsToDate:
        question: Amount so far in <fg-show path="/taxYear"/>
        hint: This might be labeled year-to-date or YTD on your statement.
    fg-detail-855fc0:
      summary: Health Savings Account (HSA) or Flexible Spending Account (FSA)
      p-5e048a: Enter total contributions to your <span condition="/isFilingStatusMFJ"
        operator="isTrue">spouse’s</span> Health Savings Account (HSA) or Flexible
        Spending Account (FSA).
      p-187adb: HSA and FSA contribution amounts can usually be found under a <strong>Deductions</strong>
        or <strong>Pre-Tax</strong> section on a statement.
      p-27a801: Learn more about contributions to <a target="_blank" href="https://www.irs.gov/publications/p969#en_US_2024_publink1000204045">HSAs</a>
        and <a target="_blank" href="https://www.irs.gov/publications/p969#en_US_2024_publink1000204176">FSAs</a>.
      /pensions/*/hsaOrFsaContributionsPerPayPeriod:
        question: Amount per pay period
      /pensions/*/hsaOrFsaContributionsToDate:
        question: Amount so far in <fg-show path="/taxYear"/>
        hint: This might be labeled year-to-date or YTD on your statement.
    fg-detail-6dc47b:
      summary: Other pre-tax benefits
      p-bccdfc: Enter the total contributions made to pay for other pre-tax benefits.
      p-29747e: Benefits contributions can usually be found under a <strong>Deductions</strong>
        or <strong>Pre-Tax</strong> section on a statement.
      p-4f3f66: '<strong>Common pre-tax benefits may include: </strong>'
      ul-0:
        li-660334: Accident insurance plans
        li-aa4a77: Dependent care assistance plans
        li-66356e: Group-term life insurance on the lives of employees
        li-f54649: Qualified adoption assistance
        li-921253: Accidental death or dismemberment insurance
        li-4a41d5: Long-term and short-term disability coverage
        li-fe33dd: Qualified transportation fringe benefit
      p-5a0ed2: <strong>Don’t include:</strong>
      ul-1:
        li-a867f4: Long-term care contributions
        li-a981e6: Employer contributions
      /pensions/*/otherPreTaxContributionsPerPayPeriod:
        question: Amount per pay period
      /pensions/*/otherPreTaxContributionsToDate:
        question: Amount so far in <fg-show path="/taxYear"/>
        hint: This might be labeled year-to-date or YTD on your statement.
  h3-3767e5: Self-employment income
  p-4586da: This includes income from a partnership, trade, or business that you <span
    condition="/isFilingStatusMFJ" operator="isTrue">or your spouse</span> own. It
    can also include income earned as a freelancer, contractor, or gig worker.
  p-d93391: <modal-link for="modal-what-counts-self-employment">What counts as self-employment
    income?</modal-link>
  collection/selfEmploymentSources:
    itemName: self-employment income
    /selfEmploymentSources/*/filerAssignment:
      question: Who is this income for?
      options:
        self:
          name: Myself
        spouse:
          name: My spouse
    /selfEmploymentSources/*/grossIncome:
      question: What’s the total gross income <span condition="/selfEmploymentSources/*/notSpouses"
        operator="isTrue">you</span><span condition="/selfEmploymentSources/*/notSpouses"
        operator="isFalse">they</span> expect to earn from this self-employment work
        in <fg-show path="/taxYear"/>?
      modalLink: <modal-link for="modal-self-employment-gross-total">What’s total
        gross income and where do I find it?</modal-link>
    /selfEmploymentSources/*/workRelatedExpenses:
      question: Total self-employment work-related expenses <span condition="/selfEmploymentSources/*/notSpouses"
        operator="isTrue">you</span><span condition="/selfEmploymentSources/*/notSpouses"
        operator="isFalse">they</span> expect to deduct in <fg-show path="/taxYear"/>
      hint: It's okay to estimate or leave this blank.
      modalLink: <modal-link for="modal-self-employment-deductions">What does it mean
        to deduct expenses?</modal-link>
  h3-941f47: Social Security income
  p-0c991a: <modal-link for="modal-what-counts-social-security">What counts as Social
    Security income?</modal-link>
  collection/socialSecuritySources:
    itemName: Social Security income
    /socialSecuritySources/*/filerAssignment:
      question: Who is this Social Security income paid to?
      options:
        self:
          name: Myself
        spouse:
          name: My spouse
    h5-d3b69e: Timing
    /socialSecuritySources/*/isAllYear:
      question: Do <span condition="/socialSecuritySources/*/notSpouses" operator="isTrue">you</span><span
        condition="/socialSecuritySources/*/notSpouses" operator="isFalse">they</span>
        expect to have this Social Security income all year or only part of the year?
      options:
        'true':
          name: All year (January 1–December 31, <fg-show path="/taxYear"/>)
        'false':
          name: Part of the year
    /socialSecuritySources/*/startDate:
      question: What’s the first day in <fg-show path="/taxYear"/> <span condition="/socialSecuritySources/*/notSpouses"
        operator="isTrue">you</span><span condition="/socialSecuritySources/*/notSpouses"
        operator="isFalse">they</span> expect to receive Social Security?
      hint: It’s okay to estimate.
    /socialSecuritySources/*/endDate:
      question: What’s the last day in <fg-show path="/taxYear"/> <span condition="/socialSecuritySources/*/notSpouses"
        operator="isTrue">you</span><span condition="/socialSecuritySources/*/notSpouses"
        operator="isFalse">they</span> expect to receive Social Security?
      hint: It’s okay to estimate.
    h5-e0f74c: Social Security details
    p-216488: Once we know more about your income, we’ll ask you additional questions.
    h5-1f08d0: Income
    /socialSecuritySources/*/monthlyIncome:
      question: What’s the monthly benefit amount <span condition="/socialSecuritySources/*/notSpouses"
        operator="isTrue">you</span><span condition="/socialSecuritySources/*/notSpouses"
        operator="isFalse">they</span> <span condition="/socialSecuritySources/*/isFutureOrUnknown"
        operator="isTrue">receive</span><span condition="/socialSecuritySources/*/isFutureOrUnknown"
        operator="isFalse">received</span> from Social Security?
      hint: Include the total amount before any Medicare premiums and other deductions
        are taken out.
      modalLink: <modal-link for="modal-fed-tax-social-security-pay-period">What’s
        the monthly benefit amount and where do I find it?</modal-link>
    h5-9f886e: Federal taxes
    /socialSecuritySources/*/withheldRate:
      question: What percent of your monthly Social Security benefit <span condition="/socialSecuritySources/*/isFutureOrUnknown"
        operator="isTrue">is</span><span condition="/socialSecuritySources/*/isFutureOrUnknown"
        operator="isFalse">was</span> withheld for federal tax?
      hint: If <span condition="/socialSecuritySources/*/notSpouses" operator="isTrue">you</span><span
        condition="/socialSecuritySources/*/notSpouses" operator="isFalse">they</span>
        haven’t chosen to withhold federal taxes, select 0%.
      modalLink: <modal-link for="modal-fed-social-security-tax-withheld">How do I
        know if I have taxes withheld?</modal-link>
      options:
        zero:
          name: 0%
        seven:
          name: 7%
        ten:
          name: 10%
        twelve:
          name: 12%
        twentyTwo:
          name: 22%
  h3-09f887: Unemployment income
  p-c25e0b: <modal-link for="modal-what-counts-unemployment">What counts as unemployment
    income?</modal-link>
  /unemploymentIncome:
    question: Total gross unemployment income you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to receive in <fg-show path="/taxYear"/>
    hint: Gross means the total amount of income before taxes or deductions.
  /unemploymentIncomeWithholding:
    question: Did you choose to withhold federal tax from your unemployment income?
    modalLink: <modal-link for="modal-fed-unemployment-tax-withheld-en">How do I know
      if I have taxes withheld?</modal-link>
  h3-0b2817: Pre-tax retirement account income
  p-b18d71: |-
    <modal-link for="modal-what-counts-pre-tax-retirement">
              What counts as a distribution from pre-tax retirement accounts?
            </modal-link>
  /preTaxRetirementAccountIncome:
    question: Total distributions you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to receive from pre-tax retirement accounts in <fg-show
      path="/taxYear"/>
    hint: Don’t include distributions from Roth (post-tax) accounts.
  h3-89425f: Investment income
  p-614f3a: Even if you <span condition="/isFilingStatusMFJ" operator="isTrue">or
    your spouse </span>expect to earn a small amount of investment income, adding
    this amount will help get the most accurate withholding estimate.
  fg-detail-b4c28b:
    summary: Interest income
    p-7164c2: <modal-link for="modal-estimate-interest-income-en">What's interest
      income and how can I estimate it?</modal-link>
    /taxableInterestIncome:
      question: Interest income you<span condition="/isFilingStatusMFJ" operator="isTrue">
        and your spouse</span> expect to earn in <fg-show path="/taxYear"/>
  fg-detail-39fb22:
    summary: Ordinary or qualified dividends
    p-b595ad: Enter the total amounts you expect to earn in <fg-show path="/taxYear"/>.
    p-98b838: <modal-link for="modal-what-are-dividends-en">What are dividends and
      how can I estimate them?</modal-link>
    /ordinaryDividendsIncome:
      question: Ordinary dividend income you <span condition="/isFilingStatusMFJ"
        operator="isTrue">and your spouse</span> expect to earn in <fg-show path="/taxYear"/>
    /qualifiedDividendsIncome:
      question: Qualified dividend income you <span condition="/isFilingStatusMFJ"
        operator="isTrue">and your spouse</span> expect to earn in <fg-show path="/taxYear"/>
  fg-detail-89ef66:
    summary: Short-term or long-term gains and losses
    p-c7eaa1: Enter the total amounts you expect to earn and lose in <fg-show path="/taxYear"/>.
    p-51406f: <modal-link for="modal-what-are-short-long-term-gains-losses-en">What
      are short- and long-term gains and losses, and how can I estimate them?</modal-link>
    /shortTermCapitalGainsIncome:
      question: Short-term gains you <span condition="/isFilingStatusMFJ" operator="isTrue">and
        your spouse</span> expect to earn in <fg-show path="/taxYear"/>
    /shortTermCapitalLoss:
      question: Short-term losses you <span condition="/isFilingStatusMFJ" operator="isTrue">and
        your spouse</span> expect in <fg-show path="/taxYear"/>
    /longTermCapitalGainsIncome:
      question: Long-term gains you <span condition="/isFilingStatusMFJ" operator="isTrue">and
        your spouse</span> expect to earn in <fg-show path="/taxYear"/>
    /longTermCapitalLoss:
      question: Long-term losses you <span condition="/isFilingStatusMFJ" operator="isTrue">and
        your spouse</span> expect in <fg-show path="/taxYear"/>
  fg-detail-28fc9b:
    summary: Rental income
    p-1ee2d6: <modal-link for="modal-rental-expenses-net-income-en">What are rental
      expenses and how can I estimate net rental income?</modal-link>
    /rentalIncome:
      question: Net amount of rental income you <span condition="/isFilingStatusMFJ"
        operator="isTrue">and your spouse</span> expect to earn in <fg-show path="/taxYear"/>
      hint: Net is the total minus any expenses.
  fg-detail-3026f7:
    summary: Royalties
    p-56e5d9: <modal-link for="modal-estimate-royalty-income-en">How can I estimate
      royalty income?</modal-link>
    /royaltyIncome:
      question: Royalty income you <span condition="/isFilingStatusMFJ" operator="isTrue">and
        your spouse</span> expect to earn in <fg-show path="/taxYear"/>
  fg-detail-b186f4:
    summary: Passive or non-passive income from S-corporations or partnerships
    p-b595ad: Enter the total amounts you expect to earn in <fg-show path="/taxYear"/>.
    p-8fca11: <modal-link for="modal-estimate-s-corp-partnership-income-en">How can
      I estimate income from S-corporations or partnerships?</modal-link>
    /sCorpPassiveIncome:
      question: Passive income from S-corporations or partnerships you <span condition="/isFilingStatusMFJ"
        operator="isTrue">and your spouse</span> expect to earn in <fg-show path="/taxYear"/>
    /sCorpNonPassiveIncome:
      question: Non-passive income from S-corporations or partnerships you <span condition="/isFilingStatusMFJ"
        operator="isTrue">and your spouse</span> expect to earn in <fg-show path="/taxYear"/>
  h3-95eb01: Other taxable income not already included above
  p-a4536a: 'Estimate any other taxable income that you <span condition="/isFilingStatusMFJ"
    operator="isTrue">and your spouse</span> think you''ll receive in <fg-show path="/taxYear"/>,
    including:'
  ul-0:
    li-6c1f6e: Taxable scholarships
    li-b9815d: Winnings from gambling
    li-98533d: Alimony from pre-2019 divorce decrees
    li-479a5d: Court awards and damages (unless they're for physical injury or sickness)
    li-55fa19: Fees for services you've provided
  p-48332b: <a target="_blank" href="https://www.irs.gov/filing/taxable-income" class="usa-link
    usa-link--external">Learn more about other taxable income.<span class="usa-sr-only">
    (opens in a new tab)</span></a>
  /nonSpecificOtherIncome:
    question: Total amount of other income you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to receive in <fg-show path="/taxYear"/>
    hint: Enter one total amount for all other income.
  /otherIncomeWithholding:
    question: Federal taxes withheld from your <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse's</span> other income so far in <fg-show path="/taxYear"/>
    hint: If you don't know, leave this blank.
  h3-536be3: Estimated taxes paid
  p-67bec4: In addition to taxes already withheld from your income, estimated payments
    are made directly to the IRS, usually through an IRS Online Account or with Form
    1040-ES.
  p-8f958a: <a target="_blank" href="https://www.irs.gov/businesses/small-businesses-self-employed/estimated-taxes"
    class="usa-link usa-link--external">Learn more about estimated taxes.<span class="usa-sr-only">
    (opens in a new tab)</span></a>
  /totalEstimatedTaxesPaid:
    question: Estimated tax payments you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> made so far in <fg-show path="/taxYear"/>
    hint: Don't include taxes withheld from paychecks and other income.
  modal-pay-frequency-en:
    heading: Learn more about pay frequency
    p-f8e48f: Pay frequency is how often a person gets paid by an employer or pension.
    ul-0:
      li-ae23d7: '<strong>Weekly</strong>: Paid once per week'
      li-9e775f: '<strong>Every two weeks</strong>: Paid every other week and gets
        two-to-three payments per month'
      li-569d8d: '<strong>Twice monthly</strong>: Always paid twice a month on certain
        days. For example, the 1st and the 15th of the month'
      li-fdcbf1: '<strong>Once monthly</strong>: Paid one time per month'
    p-8ef9ed: If your pay frequency doesn’t match one of these, then choose the closest
      option and adjust your pay accordingly.
  modal-job-pay-dates-en:
    heading: Learn more about pay frequency
    p-8b4b93: |-
      You can find the pay period and pay date on the paystub, the statement that comes with a
                paycheck and tells you about the details of the pay.
    ul-0:
      li-8a677f: '<strong>Pay period</strong>: The days that you worked and are being
        paid for, sometimes shown as a start and end date'
      li-1b998e: '<strong>Pay date</strong>: The date when the paycheck is issued
        or dated'
  modal-job-gross-pay-period-en:
    heading: How do I find the gross income per pay period?
    p-86ad55: |-
      Gross income per pay period is the total amount you’re paid for the dates on a single
                paycheck before any taxes or deductions are taken out.
    p-a88bb0: If there’s additional pay, like bonus pay, tips, or overtime for the
      pay period, it will be included in the gross amount.
    p-654d7e: <strong>Where to find it</strong>
    p-22c78c: Check the paystub for the <strong>gross amount per pay period</strong>,
      which only includes the pay for the days you worked on this current paystub.
  modal-what-counts-social-security:
    heading: What counts as Social Security income?
    p-00bbe8: Social Security is benefit payments made to retirees, people with disabilities,
      and their families through the Social Security Administration (SSA). To report
      this income at the end of the year, the SSA sends Form SSA-1099.
    p-39e713: <strong>Don’t include</strong> Supplemental Security Income (SSI) payments.
      The estimator doesn’t currently support SSI payments.
  modal-fed-tax-social-security-pay-period:
    heading: What’s the monthly benefit amount and where do I find it?
    p-82e34c: The monthly benefit amount is the total you receive from Social Security
      each month <strong>before</strong> any deductions, Medicare premiums, or taxes
      are taken out.
    p-716710: 'It’s okay to estimate. To find the exact amount:'
    ol-0:
      li-ea5ad7: Log into <a target="_blank" href="https://www.ssa.gov/myaccount/"
        class="usa-link">my Social Security account<span class="usa-sr-only"/></a>
      li-5b74be: Scroll to the <strong>Benefits and Payments</strong> section
      li-53a1fa: Under <strong>Benefit Summary</strong>, use the total monthly benefit
        before deductions
    p-b74063: If you need help finding the monthly benefit amount, call the Social
      Security Administration at 1-800-772-1213.
  modal-fed-social-security-tax-withheld:
    heading: How do I know if I have taxes withhheld?
    p-1a87a7: The Social Security Administration doesn’t automatically withhold federal
      taxes from your Social Security income.
    p-a147e9: You can request to withhold federal taxes from your Social Security
      income.
    p-88d383: 'How to check if you have taxes withheld:'
    ol-0:
      li-ea5ad7: Log into <a target="_blank" href="https://www.ssa.gov/myaccount/"
        class="usa-link">my Social Security account<span class="usa-sr-only"/></a>
      li-ae75a0: Select <strong>Voluntary Tax Withholding</strong> to check the percentage
        withheld
    p-2f6487: If you didn’t request to withhold taxes, the percentage will be 0%.
    p-c1b4cc: If you don’t have a my Social Security account, or need help checking
      your federal withholdings, call the Social Security Administration at 1-800-772-1213.
  modal-what-counts-job:
    heading: What counts as a job?
    p-cc1a45: A job is when you earn income by working for an employer. At the end
      of the year, the employer will send a Form W-2 to report this income.
    p-fcadfe: '<strong>Don’t include</strong> income earned through:'
    ul-0:
      li-ad6e01: A partnership, trade, or business that you own
      li-78d8a9: On-demand work, services, or goods as a freelancer, contractor, or
        gig worker
    p-8bf756: Add this income in the <strong>Self-employment income</strong> section
      instead.
  modal-what-counts-pension:
    heading: What counts as a pension or annuity?
    p-131b40: A pension is generally a series of definitely determinable payments
      made to you after you retire from work. Pension payments are made regularly
      and are based on factors such as years of service and past pay.
    p-acdc8a: An annuity is a series of payments under a contract made at regular
      intervals over a period of more than 1 full year.
    p-8ef182: At the end of the year, a pension or annuity provider will send a Form
      1099-R to report this income.
    p-c74e46: Don’t include distributions or withdrawals from 401(k), 403(b), or 457(b)
      plans or Individual Retirement Arrangements (IRAs). Add this income as <strong>Pre-tax
      retirement account income</strong> instead.
  modal-pension-gross-pay-period:
    heading: How do I find the gross income for the most recent payment?
    p-fef4bf: This is the total amount of your most recent pension or annuity payment,
      before any taxes or deductions are taken out.
    p-c19981: <strong>On your most recent statement</strong>, check for the gross
      payment amount.
    p-0f1994: 'If the annual amount of your pension or annuity will be the same as
      last year, you can also refer to your <fg-show path="/lastTaxYear"/> Form 1099-R.
      To estimate the gross amount for your most recent payment:'
    ol-0:
      li-8cda67: Find Box 1 on the Form 1099-R, which shows the gross amount for all
        of last year
      li-88cea7: Divide last year’s gross amount by the number of payments you expect
        to receive in <fg-show path="/taxYear"/>
  modal-pension-gross-ytd-end:
    heading: How do I find the gross income so far in <fg-show path="/taxYear"/>?
    p-1f18fb: Gross income is the total amount you’ve been paid, before any taxes
      or deductions are taken out.
    p-818dfb: <strong>On your most recent statement</strong>, check for the gross
      income so far this year. This might be labeled as gross income year-to-date
      or YTD.
    p-83d213: <strong>If you don’t have a statement</strong>, but know the gross amount
      per payment, you can estimate by multiplying it by the number of payments you’ve
      received so far in <fg-show path="/taxYear"/>.
    p-9475e2: 'If the annual amount of your pension or annuity will be the same as
      last year, you can also refer to your <fg-show path="/lastTaxYear"/> Form 1099-R.
      To estimate the gross income so far this year:'
    ol-0:
      li-8cda67: Find Box 1 on the Form 1099-R, which shows the gross amount for all
        of last year
      li-88cea7: Divide last year’s gross amount by the number of payments you expect
        to receive in <fg-show path="/taxYear"/>
      li-8ed353: Then, multiply by the number of payments you’ve received so far in
        <fg-show path="/taxYear"/>
  modal-fed-tax-pension-pay-period:
    heading: How do I find federal taxes withheld for the most recent payment?
    p-eb3a66: These are amounts withheld, or taken out of your pension or annuity
      payment to pay for federal taxes.
    p-6b6de8: <strong>On your most recent statement</strong>, check for the federal
      taxes paid for each payment.
    ul-0:
      li-b14438: This may appear as a single line called Taxes, FIT, FITW, FITC, Fed
        W/H, Fed tax, Fed withholding, Federal income tax or similar
      li-16154b: If you have requested extra federal taxes to be withheld, that extra
        amount may appear on a separate line. Be sure to add these two amounts
    p-1754a4: 'If the annual amount of your pension or annuity will be the same as
      last year, you can also refer to your <fg-show path="/lastTaxYear"/> Form 1099-R.
      To estimate federal taxes withheld for the most recent payment:'
    ol-0:
      li-62615d: Find Box 4 on the Form 1099-R, which shows the federal taxes withheld
        for all of last year
      li-71dfdf: Divide last year’s withholding amount by the number of payments you
        expect to receive in <fg-show path="/taxYear"/>
    p-d6e23c: <strong>Don’t include</strong> state taxes, local taxes, Medicare, Social
      Security, or other amounts withheld.
  modal-fed-pension-tax-ytd:
    heading: How do I find federal taxes withheld so far in <fg-show path="/taxYear"/>?
    p-737d99: These are amounts withheld, or taken out of a pension or annuity payment
      to pay for federal taxes throughout the year.
    p-29415d: <strong>On your most recent statement</strong>, check for the federal
      taxes paid so far this year. This might be labeled as year-to-date or YTD.
    ul-0:
      li-b14438: This may appear as a single line called Taxes, FIT, FITW, FITC, Fed
        W/H, Fed tax, Fed withholding, Federal income tax or similar
      li-16154b: If you have requested extra federal taxes to be withheld, that extra
        amount may appear on a separate line. Be sure to add these two amounts
    p-e5ca13: 'If the annual amount of your pension or annuity will be the same as
      last year, you can also refer to your <fg-show path="/lastTaxYear"/> Form 1099-R.
      To estimate federal taxes withheld so far this year:'
    ol-0:
      li-5b0ddc: Find Box 4 on the Form 1099-R, which shows federal taxes withheld
        last year
      li-71dfdf: Divide last year’s withholding amount by the number of payments you
        expect to receive in <fg-show path="/taxYear"/>
      li-8ed353: Then, multiply by the number of payments you’ve received so far in
        <fg-show path="/taxYear"/>
    p-d6e23c: <strong>Don’t include</strong> state taxes, local taxes, Medicare, Social
      Security, or other amounts withheld.
  modal-what-counts-self-employment:
    heading: What counts as self-employment income?
    p-fd0d43: Self-employment income is earned from a partnership, trade, or business
      that you own. It can also be earned by providing on-demand work, services, or
      goods as a freelancer, contractor, or gig worker.
    p-07a211: To report this income at the end of the year, the payer (person, business,
      or organization that pays you) will send a Form 1099-NEC, Form 1099-K, or Form
      1099-MISC.
    p-089c0d: <strong>Don’t include</strong> income earned by working for an employer.
      If the payer sends a Form W-2 with federal taxes withheld, then add this income
      in the <strong>Jobs with an employer (W-2)</strong> section instead.
  modal-self-employment-gross-total:
    heading: What's total gross income and where do I find it?
    p-47ef44: <strong>What is it?</strong>
    p-7caa26: Total gross income is the total amount you expect to earn this year,
      before any taxes, deductions, or expenses are taken out.
    p-2c88f0: If you expect to earn any additional pay this year, like bonus pay,
      tips, or overtime, include it in the gross amount.
    p-947881: <strong>Where to find it?</strong>
    p-807ad5: You can estimate gross total income by tracking how much you earn from
      self-employment. You may need to estimate your self-employment income for the
      entire year.
    p-0651e4: <strong>How to check last year's tax return?</strong>
    p-55c57e: If you were self-employed last year and expect your earnings to stay
      the same, you can find your gross income on line 7 of Schedule C.
  modal-self-employment-deductions:
    heading: What does it mean to deduct expenses?
    p-90fb6d: |-
      When you're self employed, a gig worker, or own and operate a business, you may be able to
                deduct certain business expenses from your income so you'll pay less tax.
    p-643fbe: 'Business expenses could include:'
    ul-0:
      li-6a4179: Home office expenses
      li-e2f63f: Car and truck expenses
      li-7f4118: Rent
      li-9f53a8: Employee pay and pensions
      li-eaff1b: Insurance
      li-6c49ac: Interest on debts
      li-761662: Legal and professional fees
      li-719fec: Taxes
      li-849c98: Travel and meals
    p-359e1c: |-
      These deductions are different from the personal deductions you'll make if you choose to
                itemize your deductions. You can deduct your business expenses here and still choose the
                standard deduction later.
    p-0651e4: <strong>How to check last year's tax return?</strong>
    p-203379: |-
      If you were self-employed last year and expect your work-related expenses to stay the
                same, you can find your deductible expenses on line 28 of Schedule C.
    p-4ca1ce: <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p334#en_US_2024_publink1000313491">Learn
      more about business expenses</a>
  modal-what-counts-unemployment:
    heading: What counts as unemployment income?
    p-5c629b: Unemployment income is a joint state-federal program that provides cash
      benefits to eligible workers.
    p-d575d4: To receive unemployment, you must become unemployed through no fault
      of your own and meet other requirements.
    p-c2b99e: At the end of the year, you should receive Form 1099-G showing the amount
      paid to you during the year.
    p-9e9dfa: <a target="_blank" class="usa-link" href="https://www.irs.gov/individuals/employees/unemployment-compensation">Learn
      more about unemployment income.</a>
  modal-fed-unemployment-tax-withheld-en:
    heading: How do I know if I have taxes withheld?
    p-097607: You can choose to have 10% federal income tax withheld from your unemployment
      compensation by submitting Form W-4V to the unemployment office.
    p-68c79a: <strong>How to check if you have taxes withheld:</strong>
    ul-0:
      li-00bded: Check your unemployment statement for federal tax withholding
      li-68b85b: Call your unemployment office and ask about your withholding
    p-b82dc7: If you didn't request to withhold taxes, select no.
  modal-what-counts-pre-tax-retirement:
    heading: What counts as a distribution from pre-tax retirement accounts?
    p-a7106a: Any withdrawal of pre-tax funds from a 401(k), 403(b), 457(b), or traditional
      Individual Retirement Arrangement (IRA) counts as a distribution. This includes
      distributions at retirement, early withdrawals, required minimum distributions
      (RMDs), and pretax-to-Roth conversions.
    p-a88342: At the end of the year, your financial institution will send a Form
      1099-R to report this income.
    p-5a0ed2: <strong>Don’t include:</strong>
    ul-0:
      li-20ffee: Distributions from Roth (post-tax) accounts.
      li-f28c25: Other forms of retirement income, like pensions, annuities, Social
        Security, or other investment income. You’ll enter them in other sections.
  modal-estimate-interest-income-en:
    heading: What's interest income and how can I estimate it?
    p-cda131: Common types of interest income include interest earned from bank accounts
      or from lending money.
    p-a2889a: To estimate your interest income, look at your monthly bank statements
      to see how much you've been earning in interest each month. Multiply the monthly
      average by 12 to get an estimate for the year.
    p-5a5d76: When estimating interest income, it's better to guess a higher amount.
      If you underestimate, it can lead to not withholding enough federal tax throughout
      the year.
    p-bc395c: <strong>How to check last year's tax return</strong>
    p-f1a76a: 'If you earned interest income last year and think you''ll earn a similar
      amount this year, check for an amount in:'
    ul-0:
      li-7fd107: Line 2b on Form 1040 of your <fg-show path="/lastTaxYear"/> federal
        tax return
  modal-what-are-dividends-en:
    heading: What are dividends and how can I estimate them?
    p-79b2c0: Ordinary or qualified dividends are payments made by corporations to
      shareholders based on a company’s profits. The main difference between the two
      is that qualified dividends are taxed at a lower rate.
    p-504f40: <strong>How to estimate dividends</strong>
    p-8bdec9: Dividends are often paid out quarterly. To estimate your dividends,
      look at your financial statements to see how much you’ve earned in dividends
      so far this year. Multiply your average quarterly dividend by four (or a different
      number if not quarterly) to get an estimate for the year.
    p-65a8c3: When estimating dividends, it’s better to guess a higher amount. If
      you underestimate, it can lead to not withholding enough federal tax throughout
      the year.
    p-5258da: <strong>How to check last year’s tax return</strong>
    p-c52a86: 'If you think you’ll get the same dividends this year, use last year’s
      amounts as your estimate. Check Form 1040 from your <fg-show path="/lastTaxYear"/>
      federal tax return:'
    ul-0:
      li-8406bc: Line 3b minus line 3a for ordinary dividends
      li-5810f9: Line 3a for qualified dividends
  modal-what-are-short-long-term-gains-losses-en:
    heading: What are short- and long-term gains and losses, and how can I estimate
      them?
    p-f18360: 'The length of time you hold an asset determines what type of gain or
      loss it is:'
    ul-0:
      li-57b37b: <strong>Short-term gain or loss</strong>, if you held the asset for
        less than a year.
      li-02555a: <strong>Long-term gain or loss</strong>, if you held the asset for
        more than one year.
    p-750d95: <strong>How to check for gains and losses</strong>
    p-99bae4: If you have an investment or brokerage account, log in or review your
      latest statement to check for any short- or long-term gains and losses this
      year.
    p-6412ce: <strong>How to estimate gains and losses</strong>
    p-62a198: If you plan to sell any assets before the end of the year, include the
      estimated gains or losses in your total.
    p-dff0b2: When estimating short- and long-term gains, it's better to guess a higher
      amount. If you underestimate, it can lead to not withholding enough federal
      tax throughout the year.
  modal-rental-expenses-net-income-en:
    heading: What are rental expenses and how can I estimate net rental income?
    p-8093b7: <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p527#en_US_2024_publink1000218977">Rental
      expenses<span class="usa-sr-only"> (opens in a new tab)</span></a> include maintenance
      costs, insurance, taxes, and interest.
    p-21afbd: <strong>How to estimate net rental income</strong>
    p-cd2d5f: First, add up all the money you expect to receive from tenants during
      the year. Next, subtract your rental expenses.
    p-e79a7f: When estimating rental income, it's better to guess a higher amount.
      If you underestimate, it can lead to not withholding enough federal tax throughout
      the year.
    p-bc395c: <strong>How to check last year's tax return</strong>
    p-ed014a: 'If you earned rental income last year and think you''ll earn a similar
      amount this year, check your <fg-show path="/lastTaxYear"/> forms:'
    ul-0:
      li-3cc72a: Schedule E (Form 1040), Part I, line 21, Columns A - C
  modal-estimate-royalty-income-en:
    heading: How can I estimate royalty income?
    p-7d15b4: Check your licensing agreements or publisher statements for expected
      payment schedules or percentages.
    p-53dd3a: If estimating future royalty income, it's better to guess a higher amount.
      If you underestimate, it can lead to not withholding enough federal tax throughout
      the year.
    p-bc395c: <strong>How to check last year's tax return</strong>
    p-c92501: 'If you earned royalties last year and think you''ll earn a similar
      amount this year, check your <fg-show path="/lastTaxYear"/> forms:'
    ul-0:
      li-90f9a8: Schedule E (Form 1040), Part I, line 23b
  modal-estimate-s-corp-partnership-income-en:
    heading: How can I estimate income from S-corporations or partnerships?
    p-ba76b7: You can use investor reports, profit/ loss statements, or other business
      data to predict annual earnings. Multiply those earnings by your ownership percentage
      or distributive share.
    p-04160c: When estimating S-corporation or partnership income, it's better to
      guess a higher amount. If you underestimate, it can lead to not withholding
      enough federal tax throughout the year.
    p-e63f56: Don't include income previously entered under self-employment.
    p-8b6f8b: <strong>How to check last year's return</strong>
    p-7e4500: 'If you earned income from S-corporations or partnerships last year
      and think you''ll earn a similar amount this year, check these <fg-show path="/lastTaxYear"/>
      forms:'
    ul-0:
      li-b8bcfa: Schedule E (Form 1040), Part II, Line 29a, Column h, for passive
        income
      li-f37c1e: Schedule E (Form 1040), Part II, Line 29a, Column k, for non-passive
        income
  modal-estimate-future-bonus-en:
    heading: How do I estimate future bonus pay?
    p-185c7d: Bonus pay is usually a one-time payment in addition to regular wages.
    p-74fc7e: If you expect to receive a year-end or quarterly bonus from the employer,
      include that amount here.
    p-c6a009: It’s okay to enter your best guess of what you will receive. You can
      also leave future bonus pay blank.
    p-e4a5c2: Don’t include any past bonus pay that you already received this year.
  modal-job-check-bonus-en:
    heading: How do I check if there's a bonus this pay period?
    p-9a2f97: Bonus pay is usually a one-time payment in addition to your regular
      wages.
    p-76b2cb: To check if you earned a bonus for the <strong>current pay period:</strong>
    ol-0:
      li-5e0c98: Find the gross or total earnings for the pay period, which only includes
        the pay for the days you worked on this current paystub.
      li-c46d32: Check if there's an amount labeled &quot;Bonus&quot; that's included
        in the gross or total earnings for the pay period.
    p-529826: <strong>Don’t include</strong> bonuses that appear in the year-to-date
      (YTD) amount. Only enter bonus pay from the current pay period. Don’t include
      overtime pay.
  modal-job-gross-ytd-end-en:
    heading: How do I find the gross income so far in <fg-show path="/taxYear"/>?
    p-1f18fb: Gross income is the total amount you’ve been paid, before any taxes
      or deductions are taken out.
    p-dd6213: If you earned any additional pay this year, like bonus pay, tips, or
      overtime, it will be included in the gross amount.
    p-654d7e: <strong>Where to find it</strong>
    p-a181b2: Check the paystub for the <strong>gross amount year-to-date</strong>
      or <strong>YTD</strong>, which includes all your pay so far in <fg-show path="/taxYear"/>.
  modal-estimate-tips-en:
    heading: How can I estimate tips?
    p-cf271a: 'To estimate the total amount of tips you’ll get in <fg-show path="/taxYear"/>:'
    p-1bf124: <strong>First</strong>, check your paystub for <strong>year-to-date
      tips</strong>, which includes any tips you’ve received so far this year.
    ul-0:
      li-934301: Tips may be labeled as Other, or Tips (credit card) on a paystub
    p-368b23: <strong>Then</strong>, add any amounts you think you’ll get for the
      rest of <fg-show path="/taxYear"/>.
    p-bb8a8e: If it’s hard to estimate, it’s ok to enter only what you’ve received
      so far, or to leave tips blank.
    p-ae35ae: Avoid entering a higher amount than you’re sure of for tips, because
      this can make your estimate less accurate.
  modal-estimate-overtime-en:
    heading: How can I estimate overtime?
    p-d2bd4e: 'To estimate the total amount of overtime you’ll get in <fg-show path="/taxYear"/>:'
    p-b3d7ea: <strong>First</strong>, check your paystub for <strong>year-to-date
      overtime</strong>, which includes any overtime you’ve received so far this year.
    ul-0:
      li-f9b117: Overtime may be labeled as OT hours, OT pay, 1.5 pay, or time-and-a-half
        on a paystub
      li-766c0d: If overtime is split into multiple line items, add them together
      li-89431a: Only include overtime that’s earned from working over 40 hours per
        week
    p-368b23: <strong>Then</strong>, add any amounts you think you’ll get for the
      rest of <fg-show path="/taxYear"/>.
    p-c62d72: |-
      If it’s hard to estimate, it’s okay to enter only what you’ve received so far, or to leave
                it blank.
    p-5d7be0: Avoid entering a higher amount than you’re sure of for overtime, because
      this can make your estimate less accurate.
    p-c62c8e: Overtime pay that is not required by section 7 of the Fair Labor Standards
      Act (e.g., due to state law or union contract) is not deductible and should
      not be entered.
  modal-estimate-overtime-rate-en:
    heading: What if I get paid a different overtime rate?
    p-73dc6c: |-
      If you’re paid for overtime at a different rate than 1.5 times or 2.0 times your regular
                pay:
    ul-0:
      li-a0e864: Select the option that’s closest to your overtime pay rate
  modal-fed-tax-pay-period-en:
    heading: How do I find federal taxes withheld per pay period?
    p-3d5320: These are amounts withheld, or taken out of your paycheck to pay for
      federal taxes.
    p-33ac3f: 'Where to find federal taxes paid <strong>per pay period</strong> on
      a paystub:'
    ul-0:
      li-8bab4d: Federal taxes paid may appear as a single line with a label of <strong>Taxes.</strong>
        If you have requested extra federal taxes withheld from your paycheck, that
        extra amount may appear on a separate line. Be sure to add these two amounts.
      li-9defdf: They may also be labeled as FIT, FITW, FITC, Fed W/H, Fed tax, Fed
        withholding, Federal income tax or similar
      li-c119f5: Check for the <strong>per-pay-period</strong> amount, which only
        includes the federal taxes paid on this paycheck
    p-d6e23c: <strong>Don’t include</strong> state taxes, local taxes, Medicare, Social
      Security, or other amounts withheld.
  modal-fed-tax-ytd-en:
    heading: How do I find federal taxes withheld so far in <fg-show path="/taxYear"/>?
    p-01be0a: These are amounts withheld, or taken out of a paycheck to pay for federal
      taxes throughout the year.
    p-583ef9: 'Where to find the federal taxes paid <strong>so far this year (year-to-date)</strong>
      on a paystub:'
    ul-0:
      li-92a8b4: Federal taxes paid may appear as a single line with a label of <strong>Taxes.</strong>If
        you have requested extra federal taxes withheld from your paycheck, that extra
        amount may appear on a separate line. Be sure to add these two amounts.
      li-9defdf: They may also be labeled as FIT, FITW, FITC, Fed W/H, Fed tax, Fed
        withholding, Federal income tax or similar
      li-af3b9e: Check for the <strong>year-to-date</strong> or <strong>YTD</strong>
        amount, which includes all federal taxes paid so far for the year
    p-d6e23c: <strong>Don’t include</strong> state taxes, local taxes, Medicare, Social
      Security, or other amounts withheld.
/adjustments:
  title: Adjustments
  h2-9fa8b1: Adjustments
  p-efc304: Estimate the amount for any adjustments <span condition="/isFilingStatusMFJ"
    operator="isFalse">you</span><span condition="/isFilingStatusMFJ" operator="isTrue">you
    and your spouse</span> plan to take this year.
  p-624555: <modal-link for="modal-what-are-adjustments">What are adjustments?</modal-link>
  p-9b971e: This estimator only supports some adjustments. There may be other adjustments
    that you qualify for, which could impact your estimate.
  h3-2c7735: Student loan interest deduction
  p-29379e: If you’re legally responsible for paying the interest on a qualified student
    loan, you can deduct up to <fg-show path="/maxStudentLoanDeduction"/> in interest
    payments. The loan must be for you, your spouse, or your dependent.
  p-3519c2: This includes both required and voluntarily pre-paid interest payments.
  p-cf7cae: <a target="_blank" href="https://www.irs.gov/taxtopics/tc456" class="usa-link">
    Learn more about student loan interest. <span class="usa-sr-only">(opens in a
    new tab)</span></a>
  /studentLoanInterestAmount:
    question: |-
      Student loan interest <span condition="/isFilingStatusMFJ" operator="isFalse">you</span>
                <span condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span> expect to pay in <fg-show path="/taxYear"/>
    hint: (max <fg-show path="/maxStudentLoanDeduction"/>)
  h3-9166fe: Educator expense deduction
  p-b30c3d: If you're a K-12 educator, you can deduct up to <fg-show path="/maxEducatorExpensesNotMFJ"/>
    of unreimbursed expenses in <fg-show path="/taxYear"/>.<span condition="/isFilingStatusMFJ"
    operator="isTrue"> If you're filing a joint tax return and both of you are educators,
    you can deduct up to <fg-show path="/maxEducatorExpensesMFJ"/>.</span>
  p-dd188e: 'Qualified expenses include:'
  ul-0:
    li-0b8a3d: Professional development courses
    li-c31915: Books, supplies, computer equipment (including related software and
      services)
    li-f3a059: Other equipment and supplementary materials that you use in the classroom
  p-b20cac: <a target="_blank" href="https://www.irs.gov/taxtopics/tc458" class="usa-link">Learn
    more about educator expenses.<span class="usa-sr-only"> (opens in a new tab)</span></a>
  /educatorExpenses/:
    question: Educator expenses <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span>
      expect to pay in <fg-show path="/taxYear"/>
    hint: (max <fg-show path="/maxEducatorExpensesLimit"/>)
  h3-e640b9: Traditional (pre-tax) IRA deduction
  p-3269b3: If <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
    condition="/isFilingStatusMFJ" operator="isTrue">you or your spouse</span> contribute
    to a traditional (pre-tax) IRA outside of your payroll contributions in <fg-show
    path="/taxYear"/>, you may be able to claim a deduction.
  p-523de9: <strong>Don’t include</strong> amounts that you already included on one
    of your jobs, contributions to Roth IRAs, or contributions to other retirement
    plans.
  p-2bd31f: <a target="_blank" href="https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-ira-contribution-limits"
    class="usa-link">Learn more about IRA contributions.<span class="usa-sr-only">
    (opens in a new tab)</span></a>
  /deductionForTraditionalIRAContribution:
    question: Traditional (pre-tax) IRA contributions <span condition="/isFilingStatusMFJ"
      operator="isFalse">you</span><span condition="/isFilingStatusMFJ" operator="isTrue">you
      and your spouse</span> expect to make in <fg-show path="/taxYear"/>
  h3-f9e99b: Self-employed retirement plan deduction
  p-8a03a1: If <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
    condition="/isFilingStatusMFJ" operator="isTrue">you or your spouse</span> are
    self employed and make contributions to qualified retirement plans in <fg-show
    path="/taxYear"/>, you may be eligible for the self-employed retirement plan deduction.
  p-f0de33: 'To qualify, <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
    condition="/isFilingStatusMFJ" operator="isTrue">you or your spouse</span> must:'
  ul-1:
    li-05453e: Be a sole proprietor
    li-292ab3: Be a working partner in a partnership, or
    li-4bca7f: Have a limited liability company
  p-345fbc: 'Eligible plans may include:'
  ul-2:
    li-ff93fe: Simplified Employee Pension (SEP) plan
    li-200ab4: Savings Incentive Match Plan for Employees
    li-e7dbe4: Solo-401(k)
    li-765afa: Other qualified retirement plans
  p-af5a4a: <strong>Don't include</strong> Individual Retirement Arrangement (IRA)
    contributions.
  p-09dfdf: You must use a special rule to calculate retirement plan contributions
    for yourself.
  p-3248f2: <a target="_blank" href="https://www.irs.gov/retirement-plans/self-employed-individuals-calculating-your-own-retirement-plan-contribution-and-deduction"
    class="usa-link">Learn more about self-employed retirement contributions.<span
    class="usa-sr-only"> (opens in a new tab)</span></a>
  /selfEmploymentRetirementPlanContributions:
    question: Self-employed retirement contributions <span condition="/isFilingStatusMFJ"
      operator="isFalse">your</span><span condition="/isFilingStatusMFJ" operator="isTrue">you
      and your spouse</span> expect to make in <fg-show path="/taxYear"/>
  h3-940849: Health Savings Account (HSA) deduction
  p-fc912f: If <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
    condition="/isFilingStatusMFJ" operator="isTrue">you or your spouse</span> contribute
    to an HSA outside of your payroll contributions in <fg-show path="/taxYear"/>,
    you can claim a deduction.
  p-739bad: <strong>Don't include</strong> amounts that you already included on one
    of your jobs.
  p-427dc4: <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-969"
    class="usa-link">Learn more about HSA contributions.<span class="usa-sr-only">
    (opens in a new tab)</span></a>
  /hsaContributionAmount:
    question: HSA contributions <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">you or your spouse</span> expect
      to make in <fg-show path="/taxYear"/>
  h3-5574f6: Alimony paid deduction
  p-e03d05: If you're divorced or separated, you can deduct alimony paid in <fg-show
    path="/taxYear"/> to a spouse or a former spouse under a divorce or separation
    instrument made before 2019.
  p-0c3c0d: <a target="_blank" href="https://www.irs.gov/taxtopics/tc452" class="usa-link">Learn
    more about alimony.<span class="usa-sr-only"> (opens in a new tab)</span></a>
  /alimonyPaid:
    question: Alimony you expect to pay in <fg-show path="/taxYear"/>
  h3-913117: Penalty for early withdrawal of savings
  p-5c9299: If <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
    condition="/isFilingStatusMFJ" operator="isTrue">you or your spouse</span> withdrew
    funds from a certificate of deposit or other deferred interest account before
    maturity, you may have been charged a penalty by your financial institution in
    <fg-show path="/taxYear"/>. You can deduct the penalty amount.
  p-0dd4e9: <a target="_blank" href="https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-exceptions-to-tax-on-early-distributions"
    class="usa-link">Learn more about penalties for early withdrawals.<span class="usa-sr-only">
    (opens in a new tab)</span></a>
  /penaltyForEarlySavingsWithdrawal:
    question: Penalty amount <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span>
      expect to pay in <fg-show path="/taxYear"/>
  h3-640ae5: Military and intelligence community moving expenses
  p-bc1f1a: 'You can deduct unreimbursed moving expenses paid in <fg-show path="/taxYear"/>
    if:'
  ul-3:
    li-a1710a: <span condition="/isFilingStatusMFJ" operator="isFalse">You're</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">You or your spouse are</span>
      a member of the Armed Forces on active duty and your move was due to a military
      order and a permanent change of station, or
    li-b646ac: <span condition="/isFilingStatusMFJ" operator="isFalse">You're</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">You or your spouse are</span>
      an employee or new appointee of the intelligence community and your move was
      due to a change in assignment which required relocation
  p-b7904a: <a target="_blank" href="https://www.irs.gov/taxtopics/tc455" class="usa-link">Learn
    more about military and intelligence community moving expenses.<span class="usa-sr-only">
    (opens in a new tab)</span></a>
  /movingExpensesForArmedServicesMembers:
    question: Moving expenses <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span>
      expect to pay in <fg-show path="/taxYear"/>
  h3-bcc8a5: Certain business expenses
  p-9fb630: 'If <span condition="/isFilingStatusMFJ" operator="isFalse">you''re</span><span
    condition="/isFilingStatusMFJ" operator="isTrue">you or your spouse are</span>
    an Armed Forces reservist, qualified performing artist, fee-basis state or local
    government official, or employee with a disability and impairment-related work
    expenses, you can deduct expenses in <fg-show path="/taxYear"/> that are:'
  ul-4:
    li-a7cbed: Common and accepted in your field of trade, business, or profession
    li-e1fa4e: Helpful and appropriate for your business
  p-30ab2e: <a target="_blank" href="https://www.irs.gov/instructions/i2106" class="usa-link">Learn
    more about certain business expenses.<span class="usa-sr-only"> (opens in a new
    tab)</span></a>
  /businessCreditsForEligible:
    question: Eligible business expenses <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span>
      expect to pay in <fg-show path="/taxYear"/>
  h3-5c4fd4: Self-employed health insurance deduction
  p-105416: If <span condition="/isFilingStatusMFJ" operator="isFalse">you're</span><span
    condition="/isFilingStatusMFJ" operator="isTrue">you or your spouse are</span>
    self employed and have a net profit for the year, you can deduct your <fg-show
    path="/taxYear"/> health insurance premiums.
  p-082b2a: Eligible premiums are medical, dental, vision, and long-term care insurance.
    The policy can be for yourself, your spouse, and your dependents. The policy can
    also cover your child who is under the age of 27 at the end of the year, even
    if the child wasn't your dependent.
  p-13dece: <a target="_blank" href="https://www.irs.gov/instructions/i7206" class="usa-link">Learn
    more about self-employed health insurance.<span class="usa-sr-only"> (opens in
    a new tab)</span></a>
  /selfEmploymentHealthInsuranceContributions:
    question: Health insurance premiums <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span>
      expect to pay in <fg-show path="/taxYear"/>
  modal-what-are-adjustments:
    heading: What are adjustments?
    p-c60313: Adjustments are expenses, payments, contributions, and fees that you
      may be able to subtract from your total income to reduce how much of your income
      gets taxed. They're a type of deduction.
/deductions:
  title: Deduction choice
  h2-414252: Standard deduction or itemized deductions
  p-cbf5dd: When you file your taxes, you can reduce your taxable income by choosing
    either the <modal-link for="modal-standard-deduction-or-itemize-deductions">standard
    deduction or itemized deductions</modal-link>.
  p-4f0299: Most people take the standard deduction because the amount is higher than
    what they’d get by itemizing.
  p-d4ef4d: If you choose to itemize deductions, we'll ask you about your expenses
    and calculate the total amount for you.
  p-550c0f: If your filing status is Married Filing Separately, you’re required to
    take the standard deduction if your spouse does. If your spouse itemizes their
    deductions, you’re required to itemize your deductions, too.
  p-ade196: <modal-link for="modal-standard-deduction-amount">Based on your answers</modal-link>,
    your standard deduction amount is <fg-show path="/standardDeduction"/>.
  p-b3aa46: Based on your answers, your standard deduction amount is <fg-show path="/standardDeduction"/>.
  /wantsStandardDeduction:
    question: Choose if you want to take the standard deduction or itemize your deductions.
    options:
      'true':
        name: Use the standard deduction (<fg-show path="/standardDeduction"/>)
      'false':
        name: Itemize deductions
  h3-a1ad7c: Itemized deductions
  p-c47c3b: If you choose to itemize, we need to ask more questions.
  p-71dd8c: If the total of your itemized deductions is higher than the standard deduction,
    we use that amount to calculate your results. This is more advantageous for you.
  p-fb9061: You chose to apply the standard deduction instead of itemizing. You can
    continue to the next page.
  p-fd1ad1: Estimate the amount for deductions you plan to take this year.
  h4-a883ab: State and local taxes
  p-29bab3: If you <span condition="/isFilingStatusMFJ" operator="isTrue">and your
    spouse</span> pay state and local taxes, you can deduct up to <fg-show path="/stateAndLocalTaxDeductionLimit"/>.
  p-5ea630: 'You can deduct:'
  ul-0:
    li-f7cfbc: State and local real estate taxes
    li-da32d6: State and local personal property taxes
  p-b6c1cd: 'You can also deduct one of the following:'
  ul-1:
    li-1c452e: State and local income taxes
    li-2afba5: State and local general sales taxes
  p-91100f: <a target="_blank" href="https://www.irs.gov/taxtopics/tc503" class="usa-link">Learn
    more about state and local taxes.</a>
  /stateAndLocalTaxPayments:
    question: State and local taxes you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to pay in <fg-show path="/taxYear"/>
    hint: (max <fg-show path="/stateAndLocalTaxDeductionLimit"/>)
  h4-627030: Gifts to charity
  p-693a4b: If you <span condition="/isFilingStatusMFJ" operator="isTrue">or your
    spouse</span> donate to a qualifying organization, you can deduct those donations.
  p-6109d4: <a target="_blank" href="https://www.irs.gov/charities-non-profits/charitable-organizations/"
    class="usa-link">Learn more about gifts to charity.</a>
  /cashCharitableContributions:
    question: Gifts to charity you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to make in <fg-show path="/taxYear"/>
  h4-0aecd8: Qualified mortgage interest and investment interest expenses
  p-ca41f8: If you <span condition="/isFilingStatusMFJ" operator="isTrue">or your
    spouse</span> borrow money to buy a main or second home or investment property,
    you may be able to deduct the interest and points you paid on that loan.
  p-94189b: <a target="_blank" href="https://www.irs.gov/taxtopics/tc505" class="usa-link">Learn
    more about mortgage interest and investment interest.</a>
  /qualifiedMortgageInterestAndInvestmentInterestExpenses:
    question: Qualified interest you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to pay in <fg-show path="/taxYear"/>
  h4-b16091: Mortgage insurance premiums
  p-a5b47a: If you <span condition="/isFilingStatusMFJ" operator="isTrue">and your
    spouse</span> will pay a premium for mortgage insurance in <fg-show path="/taxYear"/>,
    you may be able to deduct it. Your mortgage insurance contract must have been
    issued in 2007 or later for your main or second home.
  p-2a876a: 'Qualified mortgage insurance includes:'
  ul-2:
    li-d21e4b: Private mortgage insurance on conventional loans
    li-1a3c7d: Mortgage insurance premiums on Federal Housing Administration loans
    li-46b019: Funding fees on Veteran Affairs loans
    li-5d7fc7: Guarantee fees on USDA's Rural Housing Administration loans
  /qualifiedMortgageInsurancePremiums:
    question: Mortgage insurance premiums you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to pay in <fg-show path="/taxYear"/>
  h4-2ad5b3: Medical and dental expenses deduction
  p-30a251: If you <span condition="/isFilingStatusMFJ" operator="isTrue">or your
    spouse</span> pay out-of-pocket (not reimbursed by insurance) for medical and
    dental expenses or premiums, you can deduct the amount of your total expenses
    over <fg-show path="/medicalAndDentalExpensesFloor"/>.
  p-ebaf9f: <a target="_blank" href="https://www.irs.gov/taxtopics/tc502" class="usa-link">Learn
    more about medical and dental expenses.</a>
  /medicalAndDentalExpenses:
    question: Medical and dental expenses you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to pay in <fg-show path="/taxYear"/>
    hint: Don’t include insurance premiums you already entered in the Income or Adjustments
      steps.
  h4-e628b2: Casualty losses
  p-200f68: If you <span condition="/isFilingStatusMFJ" operator="isTrue">and your
    spouse</span> experience any casualty, disaster, or theft losses due to a state
    or federally declared disaster, you can deduct those losses.
  p-41e072: You can also deduct losses due to theft related to a transaction entered
    into for profit.
  p-3d9f6e: The losses must not be covered by insurance.
  p-39aa78: <a target="_blank" href="https://www.irs.gov/taxtopics/tc515" class="usa-link">Learn
    more about casualty losses.</a>
  /casualtyLossesTotal:
    question: Estimated casualty losses in <fg-show path="/taxYear"/>
  h4-fcd750: Other itemized deductions
  p-e4b51d: 'You <span condition="/isFilingStatusMFJ" operator="isTrue">and your spouse</span>
    may be able to deduct any of these expenses:'
  ul-3:
    li-78ebd4: Amortizable premium on taxable bonds
    li-bde3ca: Casualty and theft losses from income-producing property
    li-7a25f3: Excess deductions (including administrative expenses) allowed a beneficiary
      on termination of an estate or trust
    li-e782c2: Federal estate tax on income of a person who has died
    li-8a47cf: Amounts paid as part of your trade or business that represent restitution,
      remediation, or to come into compliance with the law
    li-b60c39: 90% of gambling losses up to the amount of gambling winnings
    li-84271d: Impairment-related work expenses of persons with disabilities
    li-df57a9: Losses from Ponzi-type investment schemes
    li-9fbb8c: Repayments of more than $3,000 under a claim of right
    li-202051: Otherwise deductible costs incurred in connection with any action involving
      a claim of unlawful discrimination
    li-5c9c06: Unrecovered investment in an annuity
    li-d57dd2: An ordinary loss attributable to a contingent payment debt instrument
      or an inflation-indexed debt instrument (for example, a Treasury Inflation-Protected
      Security)
  p-3c5570: <a target="_blank" href="https://www.irs.gov/publications/p529" class="usa-link">Learn
    more about other deductions.</a>
  /otherDeductionsTotal:
    question: Estimated other deductions in <fg-show path="/taxYear"/>
  h4-ab9771: 'Itemized deductions total: <fg-show path="/itemizedDeductionTotal"/>'
  p-db6824: 'We’ll use whichever number is higher when we calculate your results:
    either the standard deduction or your total itemized deductions.'
  modal-standard-deduction-or-itemize-deductions:
    heading: What are the standard deduction and itemized deductions?
    p-05b623: Both the <strong>standard deduction</strong> and <strong>itemized deductions</strong>
      are ways of reducing how much of your income gets taxed.
    p-612298: The standard deduction is a fixed amount subtracted from your income.
      It is a set amount calculated based on filing status and if you or your spouse
      are 65 or older, blind, or can be claimed as a dependent by another taxpayer
      in the tax year.
    p-b8a25f: Itemizing deductions means totaling each <a target="_blank" href="https://www.irs.gov/forms-pubs/about-schedule-a-form-1040"
      class="usa-link">Schedule A<span class="usa-sr-only"> (opens in a new tab)</span></a>
      deduction you qualify for, item by item.
    p-9d31c1: Most people take the standard deduction, but you may want to try itemizing
      deductions if you have a mortgage, large gifts to charity, or large medical
      expenses.
    p-a2eb42: You’ll save more money by choosing whichever is calculated as the larger
      deduction.
    p-617b6e: You can't take the standard deduction if you itemize your deductions.
    p-531543: <a target="_blank" href="https://www.irs.gov/newsroom/tax-basics-understanding-the-difference-between-standard-and-itemized-deductions"
      class="usa-link">Learn more about the standard deduction and itemized deductions.<span
      class="usa-sr-only"> (opens in a new tab)</span></a>
  modal-standard-deduction-amount:
    heading: Your standard deduction amount is based on your answers.
    p-0e3533: Your standard deduction is limited because you can be claimed as a dependent
      by another taxpayer.
    p-dafa6d: Your standard deduction is limited because your spouse can be claimed
      as a dependent by another taxpayer.
    p-bb6ae9: Your standard deduction is limited because you and your spouse can be
      claimed as dependents by another taxpayer.
    p-3fc80f: It's calculated as the greater of <fg-show path="/tentativeMinimumStandardDeduction"/>
      or your earned income plus <fg-show path="/earnedIncomeBump"/> (but can't be
      higher than <fg-show path="/filingStatusStandardDeduction"/>)
    p-d9e6c0: 'On top of that amount, you get an additional amount because:'
    p-bc0d47: 'Your standard deduction is based on <span condition="/isFilingStatusMFJ"
      operator="isTrue">married filing jointly</span><span condition="/isFilingStatusMFS"
      operator="isTrue">married filing separately</span><span condition="/isFilingStatusSingle"
      operator="isTrue">single</span><span condition="/isFilingStatusHOH" operator="isTrue">head
      of household</span><span condition="/isFilingStatusQSS" operator="isTrue">qualified
      surviving spouse</span> filing status plus an additional amount because:'
    ul-0:
      li-09216d: You will be 65 or older at the end of the year
      li-603910: Your spouse will be 65 or older at the end of the year
      li-b4e324: You and your spouse will be 65 or older at the end of the year
      li-80f87f: You are blind
      li-6a4489: Your spouse is blind
      li-e4bf17: You and your spouse are blind
    p-722e90: <a target="_blank" href="https://www.irs.gov/publications/p501#en_US_2024_publink1000221051"
      class="usa-link">Learn more about the standard deduction.<span class="usa-sr-only">
      (opens in a new tab)</span></a>
/additional-deductions:
  title: Additional deductions
  h2-e64960: Additional deductions
  p-9a1bd3: Estimate the amount of additional deductions that you <span condition="/isFilingStatusMFJ"
    operator="isTrue">and your spouse</span> plan to take this year.
  p-13d235: Whether you take the standard deduction or itemize, these deductions can
    further reduce how much of your income gets taxed.
  h3-cf5852: Cash charitable contributions
  p-b36cd1: When you take the standard deduction and donate to a qualifying organization
    in <fg-show path="/taxYear"/>, you can deduct cash donations up to <fg-show path="/actualNonItemizerCharitableContributionDeductionMax"/>.
  p-d8609e: 'Cash contributions include payments made by:'
  ul-0:
    li-069b30: Cash
    li-060bf2: Check
    li-5fa5bb: Electronic funds transfer or online payment service
    li-1e7cc9: Debit or credit card
    li-95186c: Payroll deduction
    li-53c28e: Transfer of gift card redeemable for cash
  p-76b3ac: <strong>The estimator is using the standard deduction</strong> because
    it's higher than your itemized deductions. If you entered any itemized cash charitable
    contributions, enter those same contributions here.
  p-795838: <a target="_blank" href="https://www.irs.gov/credits-deductions/individuals/deducting-charitable-contributions-at-a-glance"
    class="usa-link">Learn more about cash charitable contributions.</a>
  /nonItemizerCharitableContributionDeductionAmount:
    question: Cash charitable contributions you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to make in <fg-show path="/taxYear"/>
    hint: (max <fg-show path="/actualNonItemizerCharitableContributionDeductionMax"/>)
  h3-88e0af: Additional senior deduction
  p-f250e6: For 2025 through 2028, taxpayers who are age 65 and older can claim an
    additional deduction of up to <fg-show path="/maxSeniorDeductionAmount"/>.
  p-51dacf: <a target="_blank" href="https://www.irs.gov/newsroom/one-big-beautiful-bill-act-tax-deductions-for-working-americans-and-seniors"
    class="usa-link">Learn more about the additional senior deduction.</a>
  /primaryTaxpayerElectsForSeniorDeduction:
    question: Do you plan to take the additional senior deduction?
    hint: Select &quot;No&quot; if you don't have a Social Security number.
  /secondaryTaxpayerElectsForSeniorDeduction:
    question: Does your spouse plan to take the additional senior deduction?
    hint: Select &quot;No&quot; if they don't have a Social Security number.
  h3-f830e5: Car loan interest deduction
  p-b98393: If you <span condition="/isFilingStatusMFJ" operator="isTrue">or your
    spouse</span> paid car loan interest in <fg-show path="/taxYear"/>, you may be
    able to deduct up to <fg-show path="/maxQPVLIDAmount"/> of the interest you paid.
  p-d7066d: 'To qualify for the deduction, the interest must be paid on a loan that:'
  ul-1:
    li-de646c: Originated in 2025 or later
    li-c01c71: Is backed by a lien on the vehicle (a legal claim placed on the vehicle
      by the creditor to ensure payment)
    li-2e73bf: Is used to purchase a qualifying vehicle for personal use
  p-9b605a: 'A qualifying vehicle is a car, minivan, van, sport utility vehicle, pickup
    truck, or motorcycle that:'
  ul-2:
    li-13960a: Is new (not used)
    li-1ac6c8: Went through final assembly in the U.S.
    li-14ccc7: Has a gross vehicle weight of less than 14,000 lbs.
    li-71d229: Is manufactured primarily for use on public streets, roads, and highways
  p-62c99d: <a target="_blank" href="https://www.irs.gov/newsroom/one-big-beautiful-bill-act-tax-deductions-for-working-americans-and-seniors"
    class="usa-link">Learn more about qualified car loan interest.</a>
  p-43c67d: <a target="_blank" href="https://vpic.nhtsa.dot.gov/decoder/" class="usa-link">Check
    if your vehicle was assembled in the U.S.</a>
  /personalVehicleLoanInterestAmount:
    question: Car loan interest you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to pay in <fg-show path="/taxYear"/>
  h3-8e5d10: Qualified business income (QBI)
  p-36f6a7: If you <span condition="/isFilingStatusMFJ" operator="isTrue">or your
    spouse</span> own a partnership, S-corporation, or are self employed, you may
    be able to claim a deduction if you have QBI in <fg-show path="/taxYear"/>. This
    deduction may be reduced or eliminated for some service businesses.
  p-433a95: <strong>Based on your answers, you <span condition="/isFilingStatusMFJ"
    operator="isTrue">and your spouse</span> had a QBI of <fg-show path="/derivedQualifiedBusinessIncomeDeduction"/>.</strong>
  /wantsDerivedQBIDeduction:
    question: Choose if you want to use the QBI amount we calculated from your answers
      or if you want to enter a different amount.
    options:
      'true':
        name: Use <fg-show path="/derivedQualifiedBusinessIncomeDeduction"/> for this
          estimate
      'false':
        name: Enter a different amount for this estimate
  h3-090c33: Qualified business income (QBI) estimate
  p-911b92: 'To estimate QBI, calculate:'
  ol-0:
    li-eb6dd8: Expected business income for <fg-show path="/taxYear"/>
    li-5b1108: Minus ordinary business expenses (like rent, supplies, and employee
      benefits)
    li-afd842: Minus self-employment-related deductions (like self-employed health
      insurance premiums, contributions to self-employed retirement plans, and half
      of your self-employment tax)
  p-fb0f3c: <a target="_blank" href="https://www.irs.gov/newsroom/qualified-business-income-deduction"
    class="usa-link">Learn more about qualified business income.</a>
  /qBIDeductionOverrideAmount:
    question: Estimated QBI for you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> in <fg-show path="/taxYear"/>
    hint: If you’re not sure, it’s okay to enter $0.
/credits:
  title: Credits
  h2-948a2e: Credits
  p-4dde1f: |-
    Credits directly reduce the amount of tax you owe, dollar for dollar.
            Certain credits can increase your refund if their combined amount is larger than the tax you owe.
  p-7a9f8f: |-
    This estimator only supports some credits.
            There may be other credits you qualify for that could impact your estimated refund or tax owed.
  h3-ade5c7: Child Tax Credit (CTC)
  p-8adaa9: The CTC helps families raising children by providing a tax benefit of
    up to <fg-show path="/maxCtcAmount"/> per qualifying child.
  p-fbbde4: <modal-link for="modal-ctc-who-can-claim">Who can claim the CTC?</modal-link>
  /ctcEligibleDependents:
    question: Number of children
    hint: Don’t count children without a Social Security number (SSN) valid for work.
      Leave blank if <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">both you and your spouse</span>
      don’t have an SSN.
  h3-6a0442: Credit for Other Dependents (ODC)
  p-5b5094: Taxpayers with dependents who don’t qualify for the Child Tax Credit may
    be able to claim the ODC.
  p-386206: <modal-link for="modal-odc-who-can-claim">Who can claim the ODC?</modal-link>
  /odcEligibleDependents:
    question: Number of other dependents
    hint: Leave blank if you’re not a U.S. citizen, national, or lawful resident.
      Don't include dependents that you already reported for the Child Tax Credit.
  h3-bd6ff3: Child and Dependent Care Credit (CDCC)
  p-b0becb: The CDCC helps taxpayers who pay for the care of a family or household
    member while working or looking for work.
  p-c6bd24: <modal-link for="modal-cdcc-who-can-claim-and-eligible-expenses">Who can
    claim the CDCC and what expenses are eligible?</modal-link>
  /cdccQualifyingPersons:
    question: Number of qualifying children and dependents
  /cdccQualifyingExpenses:
    question: Estimated annual care expenses for <fg-show path="/taxYear"/>
    hint: max <fg-show path="/cdccMaxClaimableExpenseWithOneQP"/> for one person,
      and <fg-show path="/cdccMaxClaimableExpenseWithTwoQP"/> for two or more people
  h3-f87a1a: Earned Income Tax Credit (EITC)
  p-623bc8: The EITC helps low- to moderate-income workers and families lower their
    taxes.
  p-4b9b00: <modal-link for="modal-eitc-who-can-claim">Who can claim the EITC?</modal-link>
  /eitcQualifyingChildren:
    question: Number of qualifying children
    hint: Don't count children without a Social Security number (SSN). Leave blank
      if you <span condition="/isFilingStatusMFJ" operator="isTrue">or your spouse</span>
      don't have an SSN.
  /primaryFilerAge25OrOlderForEitc:
    question: Will you be 25 years old or older on January 1, <fg-show path="/nextTaxYear"/>?
    hint: Select &quot;No&quot; if you don't have a Social Security number.
  /secondaryFilerAge25OrOlderForEitc:
    question: Will your spouse be 25 years old or older on January 1, <fg-show path="/nextTaxYear"/>?
    hint: Select &quot;No&quot; if your spouse doesn't have a Social Security number.
  h3-d83ef2: Retirement Savings Contribution Credit
  p-5661e0: The retirement savings contribution credit is a tax benefit that helps
    low- to moderate-income taxpayers save for retirement. Enter the credit amount
    you <span condition="/isFilingStatusMFJ" operator="isTrue">and your spouse</span>
    expect to claim for contributions to a traditional IRA, Roth IRA, 401(k), 403(b),
    or similar plans.
  p-8c58ba: <modal-link for="modal-retirement-savings-credit-who-can-claim">Who can
    claim the retirement savings contribution credit and how do I estimate it?</modal-link>
  /retirementSavingsContributionsTaxCreditAmount:
    question: Retirement savings credit you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to claim in <fg-show path="/taxYear"/>
    hint: (max <fg-show path="/retirementSavingsContributionsMaximumAmount"/>)
  h3-63f260: American Opportunity Tax Credit (AOTC)
  p-1a3e61: The AOTC helps offset the cost of tuition, fees, and other expenses for
    the first four years of college.
  p-48ee6d: <modal-link for="modal-aotc-who-can-claim-and-eligible-expenses">Who can
    claim the AOTC and what expenses qualify?</modal-link>
  /qualifyingStudents:
    question: Number of college students
  /aotcQualifiedEducationExpenses:
    question: Estimated total college tuition or fees in <fg-show path="/taxYear"/>
    hint: (max <fg-show path="/maxAotcAdjustedQualifiedExpenseCap"/> per student)
  h3-5869f0: Lifetime Learning Credit (LLC)
  p-dbcaea: |-
    The LLC helps offset the cost of college courses, professional certifications, and job skill trainings.
            You can’t claim the AOTC and LLC for the same student.
  p-4e793b: <modal-link for="modal-llc-who-can-claim">Who can claim the LLC?</modal-link>
  /llcQualifiedEducationExpenses:
    question: Estimated total tuition or fees in <fg-show path="/taxYear"/>
    hint: (max $10,000)
  h3-40bd58: Adoption Credit
  p-6d6078: The adoption credit helps families offset the costs of adopting an eligible
    child.
  p-007627: <modal-link for="modal-adoption-credit-who-can-claim">Who can claim the
    adoption credit?</modal-link>
  /adoptionEligibleChildren:
    question: Number of adopted children
  /estimatedTotalQualifiedAdoptionExpenses:
    question: Adoption expenses you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to pay in <fg-show path="/taxYear"/>
    hint: (max <fg-show path="/maxAdoptionCreditPerChild"/> per child)
  h3-e318a2: Credit for the Elderly or the Disabled
  p-371ffe: This credit helps older adults and people with qualifying disabilities
    lower their taxes.
  p-77d648: <modal-link for="modal-credit-elderly-disabled-who-can-claim">Who can
    claim the credit for the elderly or the disabled?</modal-link>
  /elderlyAndDisabledTaxCreditAmount:
    question: Amount of the elderly and disabled credit you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to claim in <fg-show path="/taxYear"/>
  h3-8c57ba: Foreign Tax Credit
  p-3995ab: The foreign tax credit reduces your U.S. taxes when you pay or owe taxes
    to a foreign country or U.S. territory.
  p-2c1569: <modal-link for="modal-foreign-tax-credit-who-can-claim">Who can claim
    the foreign tax credit?</modal-link>
  /schedule3Line1:
    question: Foreign tax you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to pay in <fg-show path="/taxYear"/>
  h3-a99804: Business Credits
  p-961cbd: Business credits include many individual tax credits that reward businesses
    for things like hiring and supporting workers, energy investments, or research
    and development.
  p-821d31: <modal-link for="modal-what-are-business-credits">What are business credits?</modal-link>
  /schedule3Line6a:
    question: Amount in business credits you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to claim in <fg-show path="/taxYear"/>
  h3-f75ee7: Mortgage Interest Credit
  p-40c9a3: The mortgage interest credit reduces taxes for low- to moderate-income
    homeowners who receive a Mortgage Credit Certificate from their state or local
    government.
  p-46de1e: <modal-link for="modal-mortgage-interest-credit-who-can-claim">Who can
    claim the mortgage interest credit?</modal-link>
  /tentativeSchedule3Line6g:
    question: Estimated mortgage interest credit you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to claim in <fg-show path="/taxYear"/>
    hint: (max $2,000)
  h3-795a8a: Alternative Minimum Tax (AMT) Credit
  p-df114f: The AMT Credit allows high-income taxpayers to reclaim extra tax paid
    under the AMT in previous years.
  p-847a3c: <modal-link for="modal-amt-who-can-claim">Who can claim the AMT Credit?</modal-link>
  /alternativeMinimumTaxCreditAmount:
    question: AMT tax credit you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to claim in <fg-show path="/taxYear"/>
  modal-ctc-who-can-claim:
    heading: Who can claim the Child Tax Credit (CTC)?
    p-7c2fab: 'To claim the CTC, you must have a qualifying child who:'
    ul-0:
      li-a2f84f: Is your dependent child, stepchild, foster child, sibling, or descendant
        (grandchild, niece, nephew)
      li-d11eda: Is under 17 at the end of <fg-show path="/taxYear"/>
      li-a17024: Lives with you in the U.S. more than half the year
      li-8b8bcb: Has a Social Security number (SSN) valid for work (you or your spouse
        must also have an SSN)
      li-f5b72f: Doesn’t support themselves or plans to file a joint return (unless
        to claim a refund)
    p-c67be7: You can claim up to <fg-show path="/maxCtcAmount"/> per qualifying child.
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-e97b0b: Review line 4 on Schedule 8812 for a number greater than 0. Schedule
      8812 would have been attached to and submitted with your Form 1040 federal tax
      return.
    p-23670a: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/child-tax-credit">Learn
      more about the CTC.</a>
  modal-odc-who-can-claim:
    heading: Who can claim the Credit for Other Dependents (ODC)?
    p-25ea3f: 'To claim the ODC, you must have a qualifying dependent who:'
    ul-0:
      li-ec8076: You plan to claim as a dependent on your tax return
      li-3f5be2: Has a gross income less than <fg-show path="/odcDependentGrossIncomeThreshold"/>
      li-271d52: Lives with you in the U.S. more than half the year if they’re a child
        or for all year if they’re an adult, unless they're a <a target="_blank" class="usa-link"
        href="https://www.irs.gov/publications/p501#en_US_2024_publink1000220957">specific
        type of relative</a>
      li-3cdb99: Has a Social Security number, Individual Taxpayer Identification
        Number (ITIN), or Adoption Tax Identification Number (ATIN)
      li-54fdde: Doesn’t support themselves or plans to file a joint return
      li-38e383: Won’t be used to claim the Child Tax Credit
    p-b1ce93: You can claim up to <fg-show path="/maxOdcAmount"/> per qualifying dependent
      of any age.
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-a212c5: Review line 6 on Schedule 8812 for a number greater than 0. Schedule
      8812 would have been attached to and submitted with your Form 1040 federal tax
      return.
    p-8e621a: <a target="_blank" class="usa-link" href="https://www.irs.gov/newsroom/understanding-the-credit-for-other-dependents">Learn
      more about the ODC.</a>
  modal-cdcc-who-can-claim-and-eligible-expenses:
    heading: Who can claim the Child and Dependent Care Credit (CDCC) and what expenses
      are eligible?
    p-999ac9: To claim the CDCC, you must be paying for the care of a child under
      13 or for a spouse or dependent who lives with you and can’t care for themselves.
    p-0e2159: The person providing the care can’t be your spouse, the child’s parent,
      or another dependent.
    p-af5726: 'Expenses that qualify:'
    ul-0:
      li-b23a11: Daycare, preschool (below kindergarten)
      li-6f4e69: Before- and after-school care
      li-594aa1: Day camps
      li-531e5e: Care for a spouse or dependent who can’t care for themselves
    p-7189e3: 'Expenses that don’t qualify:'
    ul-1:
      li-0f6e34: Overnight camps
      li-cc9c3b: Private school tuition
      li-241e17: Food, lodging, or clothing unless directly tied to care
      li-dc8f3c: Payments to your spouse, the child’s parent, or another dependent
        for care
    p-ee8680: This is not a complete list. Refer to <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p503#en_US_2023_publink1000203292">Publication
      503</a> to learn more about which expenses qualify.
    p-ded29b: You can claim up to <fg-show path="/cdccMaxClaimableExpenseWithOneQP"/>
      for one person or <fg-show path="/cdccMaxClaimableExpenseWithTwoQP"/> for two
      or more people.
    p-a01583: If you’re married and filing separately from your spouse, you can only
      claim this credit if you and your spouse are legally separated or live apart
      and meet <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p503#en_US_2023_publink1000203323">other
      criteria.</a>
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-df5230: Review line 2 on Schedule 3, which would have been attached to and submitted
      with your Form 1040 federal tax return.
    p-6173e1: <a target="_blank" class="usa-link" href="https://www.irs.gov/taxtopics/tc602">Learn
      more about the CDCC.</a>
  modal-eitc-who-can-claim:
    heading: Who can claim the Earned Income Tax Credit (EITC)?
    p-787c0c: <strong>To claim the EITC with children</strong>, you must be a low-
      to moderate-income worker with a qualifying child.
    p-e38ed9: 'A qualifying child for the EITC must:'
    ul-0:
      li-df44ee: Be your child, stepchild, foster child, sibling, or descendant (grandchild,
        niece, nephew)
      li-0192a3: Be under 19 at the end of <fg-show path="/taxYear"/>, under 24 at
        the end of <fg-show path="/taxYear"/> if a full-time student, or any age if
        they are permanently disabled
      li-5ef8aa: Live with you in the U.S. more than half the year
      li-15bfc0: Have a Social Security number valid for work
      li-1b1f15: Not file a joint return (except to claim a refund)
    p-76b6a9: You can claim up to 3 qualifying children.
    p-d178a7: If you’re married and filing separately from your spouse, you can only
      claim this credit if you meet <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/earned-income-tax-credit/who-qualifies-for-the-earned-income-tax-credit-eitc#marriedfilingseparate">specific
      criteria.</a>
    p-9e7c3b: '<strong>To claim the EITC without children,</strong> you must be a
      low- to moderate-income worker who:'
    ul-1:
      li-e27492: Will be at least 25 years old but under 65 on January 1, <fg-show
        path="/nextTaxYear"/>
      li-32aee0: Lived in the U.S. for more than half the year
      li-15bfc0: Have a Social Security number valid for work
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-cdce6e: Review line 27a on Form 1040 of your federal tax return.
    p-cda0a1: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/earned-income-tax-credit-eitc">Learn
      more about the EITC.</a>
  modal-retirement-savings-credit-who-can-claim:
    heading: Who can claim the Retirement Savings Contribution Credit and how do I
      estimate it?
    p-82bd3c: To claim the retirement savings contribution credit, you must contribute
      to a traditional IRA, Roth IRA, 401(k), 403(b), or similar plan.
    p-4d4371: 'These contributions don’t qualify:'
    ul-0:
      li-51e5b0: Employer contributions or matches
      li-b4ffe6: Rollover contributions
    p-c1babe: To estimate your credit amount, multiply the retirement contributions
      you expect to make in <fg-show path="/taxYear"/> by <fg-show path="/retirementSavingsMultiplier"/>%.
      This percentage is based on your filing status and estimated adjusted gross
      income.
    p-79b58a: You can claim up to <fg-show path="/retirementSavingsMaximumAmountNonMFJ"/>
      (<fg-show path="/retirementSavingsMaximumAmountMFJ"/> if filing jointly).
    p-d2238c: If it’s hard to estimate, it’s ok to leave this credit amount blank.
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-e930e0: If you expect to have similar retirement savings as last year, you can
      use your credit amount from last year. Review line 4 on Schedule 3, which would
      have been attached to and submitted with your Form 1040 federal tax return.
    p-4f7230: <a target="_blank" class="usa-link" href="https://www.irs.gov/taxtopics/tc610">Learn
      more about the retirement savings contribution credit.</a>
  modal-aotc-who-can-claim-and-eligible-expenses:
    heading: Who can claim the American Opportunity Tax Credit (AOTC) and what expenses
      qualify?
    p-a7fc1e: 'To claim the AOTC, you, your spouse, or a dependent must:'
    ul-0:
      li-c490a5: Be in the first 4 years of higher education
      li-fad0e9: Enroll at least half-time to pursue a degree or credential
    p-7f6a17: 'You can claim up to <fg-show path="/maxAotcPerQualifyingStudent"/>
      per student, including:'
    ul-1:
      li-fb3acc: 100% of the first $2,000 in expenses
      li-1fae55: 25% of the next $2,000 in expenses
    p-1f5c56: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/qualified-ed-expenses">Expenses</a>
      can include tuition, fees, books, supplies, and other items. You can claim expenses
      paid by you, your spouse, your dependent, or a third party.
    p-26f710: This credit can’t be claimed more than 4 times per student.
    p-658bee: You can’t claim both the American Opportunity Tax Credit and the Lifetime
      Learning Credit for the same student.
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-a99490: Review line 27 on Form 8863, which would have been attached to and submitted
      with your Form 1040 federal tax return.
    p-9d7d7d: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/american-opportunity-tax-credit">Learn
      more about the AOTC.</a>
  modal-llc-who-can-claim:
    heading: Who can claim the Lifetime Learning Credit (LLC)?
    p-f5b472: 'To claim the LLC, you, your spouse, or a dependent must:'
    ul-0:
      li-a144eb: Pay tuition or fees for college courses, professional certifications,
        or job skill trainings
      li-51b299: Enroll or take courses at an <a target="_blank" class="usa-link"
        href="https://www.irs.gov/credits-deductions/individuals/eligible-educational-institution">eligible
        educational institution</a>
      li-cdf538: Enroll in one or more courses for an academic period in <fg-show
        path="/taxYear"/>
    p-52848c: You can claim up to 20% of the first $10,000 in expenses and a maximum
      of <fg-show path="/maxLlcAmountForTaxYear"/> per federal tax return. You may
      claim expenses paid by you, your spouse, your dependent, or a third party.
    p-839872: You can’t claim both the American Opportunity Tax Credit and the LLC
      for the same student.
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-9f907d: Review line 31 on Form 8863, which would have been attached to and submitted
      with your Form 1040 federal tax return.
    p-5d0cbb: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/llc">Learn
      more about the LLC.</a>
  modal-adoption-credit-who-can-claim:
    heading: Who can claim the Adoption Credit?
    p-ab884c: 'To claim the adoption credit, you or your spouse must:'
    ul-0:
      li-1221c2: Have paid qualified <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/adoption-credit#qualifiedexpenses">adoption
        expenses</a> such as adoption fees, court costs, attorney fees, or travel
      li-7f01ec: Adopt a child under 18, or who is physically or mentally unable to
        care for themselves
    p-837b60: You can claim up to <fg-show path="/maxAdoptionCreditPerChild"/> in
      qualified expenses per adopted child. <a target="_blank" class="usa-link" href="https://www.irs.gov/instructions/i8839#en_US_2024_publink23077td0e531">When
      to claim expenses</a> depends on adoption type, adoption status, and when expenses
      were incurred.
    p-c92b21: This credit is partially refundable. It can reduce your taxes and give
      you a refund up to <fg-show path="/maxRefundableAdoptionCreditAmount"/> if it
      brings your tax owed to $0. Unused amounts can be carried forward for up to
      5 years.
    p-0dfb21: If you’re married and filing separately from your spouse, you can only
      claim this credit if you lived apart from your spouse and meet <a target="_blank"
      class="usa-link" href="https://www.irs.gov/instructions/i8839#en_US_2024_publink23077td0e498">other
      criteria.</a>
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-e45e2b: Review Form 8839 (Qualified Adoption Expenses), which would have been
      attached to and submitted with your Form 1040 federal tax return.
    p-5683ce: <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-8839">Learn
      more about the adoption credit.</a>
  modal-credit-elderly-disabled-who-can-claim:
    heading: Who can claim the elderly or disabled credit?
    p-f6aeb3: 'You may qualify if:'
    ul-0:
      li-b9be11: You are 65 years old or older on January 1, <fg-show path="/nextTaxYear"/>,
        or you retire on permanent and total disability and receive taxable disability
        income
      li-80d712: Your adjusted gross income (AGI) is generally less than $17,500 ($25,000
        if married filing jointly)
      li-486ff8: Your total nontaxable Social Security, pensions, annuities, or disability
        income is generally less than $5,000 ($7,500 if married filing jointly)
    p-c6a647: Use <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-schedule-r-form-1040">Schedule
      R</a> to calculate the credit amount.
    p-cd18b6: If you're filing as Married Filing Separately, you can only claim this
      credit if you didn't live with your spouse at any time during <fg-show path="/taxYear"/>.
    p-be3be3: If you're filing as Head of Household, you can only claim this credit
      if you meet <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p524#en_US_2023_publink100038676">specific
      criteria.</a>
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-efe4ff: Review line 6d on Schedule 3, which would have been attached to and
      submitted with your Form 1040 federal tax return.
    p-22e34a: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/credit-for-the-elderly-or-the-disabled">Learn
      more about the Elderly or Disabled Credit.</a>
  modal-foreign-tax-credit-who-can-claim:
    heading: Who can claim the foreign tax credit?
    p-f75b59: 'To claim the foreign tax credit, you or your spouse must:'
    ul-0:
      li-4b51b6: Pay or owe taxes to a foreign country or U.S. territory, and
      li-2dc959: Be subject to U.S. tax on the same income
    p-944458: If you're planning to take an itemized deduction for foreign tax, then
      you won't be able to claim this credit.
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-beb725: Review line 1 on Schedule 3, which would have been attached to and submitted
      with your Form 1040 federal tax return.
    p-913a55: <a target="_blank" class="usa-link" href="https://www.irs.gov/individuals/international-taxpayers/foreign-tax-credit">Learn
      more about the Foreign Tax Credit.</a>
  modal-what-are-business-credits:
    heading: What are business credits?
    p-e6c933: 'Business credits are a group of tax credits that include incentives
      for activities such as:'
    ul-0:
      li-f80e57: Hiring and supporting workers
      li-4715cf: Energy investments
      li-40aa29: Research and development
    p-97e52e: You may need to file Form 3800 to claim them.
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-a0a8dd: Review line 6a on Schedule 3, which would have been attached to and
      submitted with your Form 1040 federal tax return.
    p-985345: <a target="_blank" class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/business-tax-credits">Learn
      more about business tax credits.</a>
  modal-mortgage-interest-credit-who-can-claim:
    heading: Who can claim the mortgage interest credit?
    p-bcd520: 'To claim the mortgage interest credit, you and your spouse must:'
    ul-0:
      li-cc8a12: Have a qualified Mortgage Credit Certificate (MCC) from your state
        or local government
      li-18244c: Pay mortgage interest on your main home
    p-f226d2: The MCC will show the percentage of interest you can claim as a credit.
      If you don’t have an MCC, you can’t claim this credit.
    p-2bce1f: This credit is limited to $2,000 per year.
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-7b5370: Review line 6g on Schedule 3, which would have been attached to and
      submitted with your Form 1040 federal tax return.
    p-0ea3a2: <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p530#en_US_2023_publink100011906">Learn
      more about the Mortgage Interest Credit.</a>
  modal-amt-who-can-claim:
    heading: Who can claim the Alternative Minimum Tax (AMT) Credit?
    p-a7cc79: 'To claim the AMT, you or your spouse must:'
    ul-0:
      li-67f80f: Have owed AMT in a prior year
      li-f5e817: Not be subject to AMT in the current year
    p-63fead: You can claim this credit by filing Form 8801.
    p-24b934: <strong>How to check if you claimed this credit last year</strong>
    p-cb09e9: Review line 6b on Schedule 3, which would have been attached to and
      submitted with your Form 1040 federal tax return.
    p-dbd9a0: <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-8801">Learn
      more about the AMT.</a>
/results:
  title: Results
